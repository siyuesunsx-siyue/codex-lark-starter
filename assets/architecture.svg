<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
  <!--
    codex-lark-starter — Architecture Diagram
    Version: 0.1.0
    Layer 1: Background
    Layer 2: Component boxes
    Layer 3: Arrows (data flow)
    Layer 4: Labels
  -->

  <defs>
    <marker id="arrow-right" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#555"/>
    </marker>
    <linearGradient id="grad-lark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3370FF"/>
      <stop offset="100%" stop-color="#245BDB"/>
    </linearGradient>
    <linearGradient id="grad-bridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00B96D"/>
      <stop offset="100%" stop-color="#009A5A"/>
    </linearGradient>
    <linearGradient id="grad-codex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="grad-openai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10A37F"/>
      <stop offset="100%" stop-color="#0D8A6A"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#F8F9FA" rx="8"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E">System Architecture — codex-lark-starter</text>

  <!-- ============================================================ -->
  <!-- Box 1: Feishu / Lark -->
  <!-- ============================================================ -->
  <rect x="40" y="120" width="200" height="180" rx="10" fill="url(#grad-lark)" filter="url(#shadow)"/>
  <text x="140" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFF">Feishu / Lark</text>
  <line x1="60" y1="168" x2="220" y2="168" stroke="#FFF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="140" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">Channel Message</text>
  <text x="140" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">&#8594; Event Subscription</text>
  <text x="140" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">&#8594; Bot WebSocket</text>
  <text x="140" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FFF" fill-opacity="0.6">HTTPS / WSS</text>

  <!-- ============================================================ -->
  <!-- Box 2: lark-channel-bridge -->
  <!-- ============================================================ -->
  <rect x="290" y="60" width="380" height="300" rx="10" fill="url(#grad-bridge)" filter="url(#shadow)"/>
  <text x="480" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFF">lark-channel-bridge</text>
  <line x1="310" y1="103" x2="650" y2="103" stroke="#FFF" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Sub-components -->
  <rect x="310" y="115" width="160" height="50" rx="6" fill="#FFF" fill-opacity="0.15"/>
  <text x="390" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">Ingestion Handler</text>
  <text x="390" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" fill-opacity="0.7">Normalizes events</text>

  <rect x="490" y="115" width="160" height="50" rx="6" fill="#FFF" fill-opacity="0.15"/>
  <text x="570" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">In-Memory Queue</text>
  <text x="570" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" fill-opacity="0.7">FIFO, configurable concurrency</text>

  <rect x="310" y="180" width="160" height="50" rx="6" fill="#FFF" fill-opacity="0.15"/>
  <text x="390" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">Dispatch Engine</text>
  <text x="390" y="219" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" fill-opacity="0.7">Round-robin to agents</text>

  <rect x="490" y="180" width="160" height="50" rx="6" fill="#FFF" fill-opacity="0.15"/>
  <text x="570" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">Agent Process Manager</text>
  <text x="570" y="219" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" fill-opacity="0.7">spawn / kill / health</text>

  <rect x="310" y="245" width="160" height="50" rx="6" fill="#FFF" fill-opacity="0.15"/>
  <text x="390" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">Response Formatter</text>
  <text x="390" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" fill-opacity="0.7">Markdown &#8594; Feishu cards</text>

  <rect x="490" y="245" width="160" height="50" rx="6" fill="#FFF" fill-opacity="0.15"/>
  <text x="570" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFF">Response Publisher</text>
  <text x="570" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" fill-opacity="0.7">Posts replies to channel</text>

  <!-- Auth label -->
  <text x="480" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFF" fill-opacity="0.5">Token refresh | HMAC verification | Rate limiting | Audit logging</text>

  <!-- ============================================================ -->
  <!-- Box 3: Codex CLI -->
  <!-- ============================================================ -->
  <rect x="720" y="120" width="200" height="100" rx="10" fill="url(#grad-codex)" filter="url(#shadow)"/>
  <text x="820" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFF">Codex CLI</text>
  <line x1="740" y1="163" x2="900" y2="163" stroke="#FFF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="820" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">JSON-lines protocol</text>
  <text x="820" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FFF" fill-opacity="0.6">stdin / stdout subprocess</text>

  <!-- ============================================================ -->
  <!-- Box 4: OpenAI -->
  <!-- ============================================================ -->
  <rect x="720" y="260" width="200" height="100" rx="10" fill="url(#grad-openai)" filter="url(#shadow)"/>
  <text x="820" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFF">OpenAI API</text>
  <line x1="740" y1="303" x2="900" y2="303" stroke="#FFF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="820" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">Model inference</text>
  <text x="820" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FFF" fill-opacity="0.6">GPT-4o / GPT-4o-mini</text>

  <!-- ============================================================ -->
  <!-- Arrows -->
  <!-- ============================================================ -->

  <!-- Feishu → Bridge (request) -->
  <line x1="240" y1="210" x2="288" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow-right)"/>
  <text x="258" y="160" font-family="system-ui, sans-serif" font-size="10" fill="#555">POST /<tspan font-weight="700">message</tspan></text>

  <!-- Bridge → Feishu (response) -->
  <line x1="288" y1="290" x2="240" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arrow-left)"/>
  <text x="255" y="275" font-family="system-ui, sans-serif" font-size="10" fill="#555"><tspan font-weight="700">reply</tspan> via API</text>

  <!-- Bridge → Codex -->
  <line x1="670" y1="170" x2="718" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arrow-right)"/>
  <text x="694" y="162" font-family="system-ui, sans-serif" font-size="9" fill="#555">{"role":"user"}</text>

  <!-- Codex → Bridge -->
  <line x1="718" y1="200" x2="670" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow-left)"/>
  <text x="690" y="215" font-family="system-ui, sans-serif" font-size="9" fill="#555">{"role":"assistant"}</text>

  <!-- Codex → OpenAI -->
  <line x1="820" y1="220" x2="820" y2="258" stroke="#555" stroke-width="2" marker-end="url(#arrow-right)"/>
  <text x="830" y="242" font-family="system-ui, sans-serif" font-size="9" fill="#555">POST /chat</text>

  <!-- OpenAI → Codex -->
  <line x1="810" y1="260" x2="810" y2="222" stroke="#555" stroke-width="2" marker-end="url(#arrow-left)"/>
  <text x="790" y="245" font-family="system-ui, sans-serif" font-size="9" fill="#555">response</text>

  <!-- ============================================================ -->
  <!-- Footer: security notes -->
  <!-- ============================================================ -->
  <rect x="40" y="410" width="880" height="80" rx="8" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="60" y="435" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#333">Security</text>
  <text x="60" y="455" font-family="system-ui, sans-serif" font-size="11" fill="#555">&#8226; Bridge binds to 127.0.0.1 by default</text>
  <text x="60" y="472" font-family="system-ui, sans-serif" font-size="11" fill="#555">&#8226; HMAC-SHA256 signature verification on all incoming events</text>
  <text x="480" y="455" font-family="system-ui, sans-serif" font-size="11" fill="#555">&#8226; Tenant access tokens auto-refreshed before expiry</text>
  <text x="480" y="472" font-family="system-ui, sans-serif" font-size="11" fill="#555">&#8226; User message content redacted from access logs</text>

  <!-- ============================================================ -->
  <!-- Footer: scaling notes -->
  <!-- ============================================================ -->
  <rect x="40" y="510" width="880" height="80" rx="8" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="60" y="535" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#333">Scaling</text>
  <text x="60" y="555" font-family="system-ui, sans-serif" font-size="11" fill="#555">&#8226; Single bridge: 10–50 concurrent conversations</text>
  <text x="60" y="572" font-family="system-ui, sans-serif" font-size="11" fill="#555">&#8226; Increase concurrency in config.json</text>
  <text x="480" y="555" font-family="system-ui, sans-serif" font-size="11" fill="#555">&#8226; Multiple bridge instances behind Redis / RabbitMQ</text>
  <text x="480" y="572" font-family="system-ui, sans-serif" font-size="11" fill="#555">&#8226; Shard by chat_id for conversation context affinity</text>

  <!-- ============================================================ -->
  <!-- Footer: version -->
  <!-- ============================================================ -->
  <text x="920" y="700" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#AAA">v0.1.0 — codex-lark-starter</text>
</svg>
